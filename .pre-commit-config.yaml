repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^deployments/new-deployment/
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: ^docs/landing/(images|blog/images)/
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["--ignore-words", ".codespell-ignore"]
        exclude: >
          (?x)^(
            .*\.html|
            .*package-lock\.json|
            regression_tests/data/schema\.json|
            rossum-agent/data/rossum-kb\.json|
            rossum-agent/rossum_agent/data/rossum-kb\.json|
          )$

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: env UV_CACHE_DIR=.uv-cache uv run ty check
        language: system
        pass_filenames: false
        types: [python]

      - id: tui-eslint
        name: tui-eslint
        entry: npx --prefix rossum-agent-tui eslint
        language: system
        files: ^rossum-agent-tui/src/.*\.(ts|tsx)$
        pass_filenames: true

      - id: tui-prettier
        name: tui-prettier
        entry: npx --prefix rossum-agent-tui prettier --check
        language: system
        files: ^rossum-agent-tui/src/.*\.(ts|tsx)$
        pass_filenames: true

      - id: tui-typecheck
        name: tui-typecheck
        entry: bash -c 'cd rossum-agent-tui && npx tsc --noEmit'
        language: system
        files: ^rossum-agent-tui/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: dead-functions
        name: dead-functions
        entry: python scripts/check_dead_functions.py
        language: system
        pass_filenames: false
        types: [python]
