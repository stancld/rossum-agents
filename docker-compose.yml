services:
  postgres:
    image: postgres:17-alpine
    container_name: rossum-postgres
    ports:
      - 127.0.0.1:5432:5432
    environment:
      POSTGRES_DB: rossum_agent
      POSTGRES_USER: rossum
      POSTGRES_PASSWORD: rossum
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rossum -d rossum_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: rossum-redis
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rossum-agent-api:
    image: rossum-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - AWS_PROFILE=${AWS_PROFILE}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - CHAT_STORAGE_BACKEND=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rossum_agent
      - POSTGRES_USER=rossum
      - POSTGRES_PASSWORD=rossum
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROSSUM_KB_DATA_PATH=/app/rossum-agent/data/rossum-kb.json
    ports:
      - 127.0.0.1:8000:8000
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
