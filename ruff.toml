# Per-service ruff formatting & linting
line-length = 119
target-version = "py312"
extend-exclude = [
    ".git",
    ".mypy_cache",
    "__pycache__",
    ".pytest_cache",
    "config",
    "data",
    "img",
]

[lint]
preview = true
explicit-preview-rules = true
select = [
    "B",  # bugbear
    "C",  # mccabe
    "E",  # PEP8 (pycodestyle)
    "F",  # pyflakes
    "I",  # isort
    "W",  # PEP8  (pycodestyle)
]
extend-select = [
    "ASYNC",  # asyncio
    "ERA",  # eradicate
    "EXE",  # executable
    "FURB",
    "ICN",  # import conventions
    "NPY",  # numpy-specific rules
    "PLC0415",  # import-outside-top-level
    "PTH",  # pathlib over os.path
    "RET",  # returns formatting
    "RUF",  # ruff-specific rules
    "SIM",  # flake8-simplify
    "T10",  # breakpoint
    "TCH",  # type-checking
    "UP",  # pyupgrade
]
unfixable = [
    "UP018",  #  native literals; Unnecessary call to str # (buggy)
]

ignore = [
    "C408",
    "E501",  # Long literals which Black can't split
    "UP010",  # Unnecessary __future__ import {import} for target Python version -- we require `from __future__ import annotations` everywhere
    "UP030",  # Use implicit references for positional format fields -- personally, I don't like relying on implicit values
    "UP031",
    "W191",  # Tab-indentation (discouraged to use with formatter)
]

[lint.per-file-ignores]
"**/tests/**" = ["PLC0415"]
"**/rossum_mcp/tools/*.py" = ["TC002"]  # FastMCP needs types at runtime for Pydantic
"**/rossum_agent/api/routes/*.py" = ["TC001", "TC003"]  # FastAPI Depends() needs types at runtime
"**/rossum_agent/api/dependencies.py" = ["TC001", "TC003"]  # FastAPI Depends() needs types at runtime

[lint.flake8-import-conventions.aliases]
"datetime" = "dt"
"numpy" = "np"
"pandas" = "pd"

[lint.flake8-import-conventions.extend-aliases]
# modules
"numpy.typing" = "npt"

[lint.flake8-unused-arguments]
# No error for unused *args and **kwargs
ignore-variadic-names = true

[lint.flake8-tidy-imports]
# Disallow all relative imports.
ban-relative-imports = "all"

[lint.flake8-type-checking]
exempt-modules = []  # default is `typing`, but we want to include these under guards if possible
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
]
runtime-evaluated-decorators = []

[lint.isort]
required-imports = ["from __future__ import annotations"]

[lint.pydocstyle]
# Use numpy-style docstrings.
convention = "numpy"

[lint.pylint]
max-returns = 10

[lint.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 12
